[bot]
# Discord机器人令牌 - 从 https://discord.com/developers/applications 获取
token=YOUR_BOT_TOKEN_HERE
# 命令前缀
prefix=!
# 机器人描述
description=Discord Bot Framework
# 活动类型 (playing, streaming, listening, watching)
activity_type=playing
# 活动名称
activity_name=with Discord.py

[logging]
# 日志级别 (DEBUG, INFO, WARNING, ERROR, CRITICAL)
level=INFO
# 日志格式
format=%%(asctime)s [%%(levelname)s] %%(name)s: %%(message)s
# 是否启用文件日志
file_enabled=true
# 是否启用控制台日志
console_enabled=true

[admin]
# 超级管理员的Discord用户ID
# 右键点击用户头像 -> 复制用户ID (需要开启开发者模式)
super_admin_id=123456789012345678